<!DOCTYPE html>
<html>

<head>
<title>Brain Tumor Detection</title>

<style>

body{
font-family: Arial;
margin:0;
padding:0;
text-align:center;

background:url("/background/bg1.png") no-repeat center center/cover;

height:100vh;
display:flex;
justify-content:center;
align-items:center;
}


/* FORM BOX */

.container{

background:white;

padding:40px;
border-radius:10px;

width:600px;

border:3px solid black;

box-shadow:0 10px 25px rgba(0,0,0,0.3);
}


/* TITLE */

h2{
color:red;
margin-bottom:30px;
}


/* FORM GRID */

.form-group{

display:flex;
align-items:center;

margin-bottom:20px;
}


/* LABEL */

label{
width:140px;
text-align:left;
font-weight:bold;
}


/* INPUT */

input[type="text"], input[type="file"]{

flex:1;

padding:10px;

border:2px solid #ccc;

border-radius:5px;
}


/* BUTTON */

button{

margin-top:20px;

padding:12px 40px;

background:#4CAF50;

color:white;

border:none;

border-radius:6px;

font-size:16px;

cursor:pointer;
}

button:hover{
background:#45a049;
}


/* PREVIEW */

.preview{
margin-top:25px;
}

.preview img{

max-width:250px;

border-radius:8px;
}

/* PREDICTION TEXT */

#predictText{

margin-top:20px;
font-size:18px;
font-weight:bold;
color:green;

}

</style>


<script>

function previewImage(event){

var reader = new FileReader();

reader.onload = function(){

var output = document.getElementById('preview');
output.src = reader.result;

}

reader.readAsDataURL(event.target.files[0]);

}


function showPredictText(){

document.getElementById("predictText").innerHTML = "Predicting... Please wait";

}

</script>

</head>


<body>

<div class="container">

<h2>Brain Tumor Detection</h2>

<form method="POST" enctype="multipart/form-data" onsubmit="showPredictText()">


<div class="form-group">

<label>Patient Name :</label>

<input type="text" name="patient_name" placeholder="Enter Patient Name" required>

</div>


<div class="form-group">

<label>Upload Image :</label>

<input type="file" name="image" accept="image/*" onchange="previewImage(event)" required>

</div>


<button type="submit">Prediction</button>

</form>


<div id="predictText"></div>


<div class="preview">

<h4>Selected Image</h4>

<img id="preview"/>

</div>

</div>

</body>
</html>
